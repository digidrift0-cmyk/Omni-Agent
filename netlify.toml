[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/logs"
  to = "/.netlify/functions/logs"
  status = 200

[[redirects]]
  from = "/api/memory"
  to = "/.netlify/functions/memory"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
